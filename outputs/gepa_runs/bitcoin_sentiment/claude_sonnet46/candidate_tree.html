resence of a standard risk section (regulatory, macro, leverage) does not by itself warrant dropping below 13 if the overall article is comprehensively bullish.\n\n4. DO NOT OVER-PENALIZE FOR STANDARD RISK DISCLOSURES:\n   - Most bullish articles include a boilerplate risk section. Only reduce the score for risks if they are presented as genuinely meaningful threats given current conditions, not just standard disclaimers.\n\n5. ALTCOIN-FOCUSED ARTICLES:\n   - If an article covers multiple cryptocurrencies (BTC, ETH, XRP) and does not give a clear net bullish or bearish signal for Bitcoin specifically, score in the neutral range (6\u20139).\n   - Do not score such articles as bullish just because Bitcoin is included or because some assets have bullish targets.\n\n6. SEPTEMBER / RED MONTH ARTICLES:\n   - Articles asking \"how low can Bitcoin go\" in a historically weak month, even with some bullish counterarguments, should score bearish (3\u20135), reflecting the dominant near-term bearish framing.\n\n---\n\nDOMAIN-SPECIFIC CALIBRATION EXAMPLES:\n\n- Comprehensive bullish article with many analyst forecasts ($120K\u2013$200K), strong on-chain data (whale accumulation score ~0.88\u20131.0), ETF inflows ($3B+/week), healthy RSI, negative funding rates (room to run), multiple institutional voices, and a standard risk section \u2192 score 13\u201314.\n- Article framed around near-term September weakness, broken support, MACD below zero, seasonal bearish patterns, ETF outflows, even with some bullish counterarguments (whale accumulation, Tom Lee $120K target, 2017 analogy) \u2192 score 3\u20135.\n- Article covering BTC, ETH, XRP with mixed signals for each, no clear net direction, hedged language throughout \u2192 score 6\u20138.\n- \"Market sentiment veering towards greed\" + macro uncertainty + mixed technicals \u2192 score 2\u20134.\n- Seasonal analysis predicting near-term drop before October recovery \u2192 score 2\u20133.\n- Multiple analysts citing $140K+ with institutional accumulation, ETF inflows, regulatory clarity, minimal caveats \u2192 score 13\u201315."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.79)", fillcolor=lightgray, tooltip=" "];
    1 [label="1\\n(0.79)", fillcolor=lightgray, tooltip=" "];
    2 [label="2\\n(0.79)", fillcolor=lightgray, tooltip=" "];
    3 [label="3\\n(0.71)", fillcolor=lightgray, tooltip=" "];
    4 [label="4\\n(0.75)", fillcolor=lightgray, tooltip=" "];
    5 [label="5\\n(0.79)", fillcolor=lightgray, tooltip=" "];
    6 [label="6\\n(0.79)", fillcolor=lightgray, tooltip=" "];
    7 [label="7\\n(0.79)", fillcolor=orange, tooltip=" "];
    8 [label="8\\n(0.75)", fillcolor=lightgray, tooltip=" "];
    9 [label="9\\n(0.83)", fillcolor=cyan, tooltip=" "];
    10 [label="10\\n(0.79)", fillcolor=lightgray, tooltip=" "];
    0 -> 1;
    0 -> 2;
    2 -> 3;
    2 -> 4;
    1 -> 5;
    5 -> 6;
    6 -> 7;
    7 -> 8;
    2 -> 9;
    9 -> 10;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
